<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gerenciador de Tarefas</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1>📋 TaskFlow</h1>
    <h2>Sistema de Gerenciamento de Tarefas</h2>

    <form action="{{ url_for('adicionar') }}" method="POST">

        <label for="titulo">Título</label>
        <input
            type="text"
            id="titulo"
            name="titulo"
            placeholder="Digite o título da tarefa"
            required>

        <label for="descricao">Descrição</label>
        <input
            type="text"
            id="descricao"
            name="descricao"
            placeholder="Digite uma descrição"
            required>

        <label for="prioridade">Prioridade</label>

        <select id="prioridade" name="prioridade">
            <option value="Alta">Alta</option>
            <option value="Média">Média</option>
            <option value="Baixa">Baixa</option>
        </select>

        <button type="submit">➕ Adicionar Tarefa</button>

    </form>

    <hr>

    <h2>Lista de Tarefas</h2>

    {% if tarefas %}

        {% for tarefa in tarefas %}

        <div class="task">

            <h3>{{ tarefa.titulo }}</h3>

            <p>{{ tarefa.descricao }}</p>

            <p>
                <strong>Prioridade:</strong>
                {{ tarefa.prioridade }}
            </p>

            <a href="{{ url_for('editar', id=tarefa.id) }}">✏️ Editar</a>

            &nbsp;&nbsp;

            <a
                href="{{ url_for('excluir', id=tarefa.id) }}"
                onclick="return confirm('Deseja realmente excluir esta tarefa?')">
                🗑️ Excluir
            </a>

        </div>

        {% endfor %}

    {% else %}

        <p style="text-align:center;">
            Nenhuma tarefa cadastrada.
        </p>

    {% endif %}

</body>

</html>
